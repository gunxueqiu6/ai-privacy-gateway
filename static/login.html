<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Privacy Gateway - 登录</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #4ade80;
            --accent-dim: #22c55e;
            --danger: #f87171;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }
        
        .error-message.show {
            display: block;
        }
        
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .btn-primary:hover {
            background: var(--accent-dim);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.85em;
        }
        
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .version-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 8px;
        }
        
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }

        /* OAuth / SSO Login Styles */
        .oauth-section {
            margin-top: 24px;
        }
        .oauth-divider {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .oauth-divider-text {
            color: var(--text-secondary);
            font-size: 0.85em;
            padding: 0 12px;
            white-space: nowrap;
        }
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.3s;
        }
        .btn-oauth:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-oauth .oauth-icon {
            flex-shrink: 0;
        }
        .btn-google .oauth-icon {
            /* The Google SVG has its own colors */
        }
        .btn-github .oauth-icon {
            color: var(--text-primary);
        }
        .oauth-info {
            text-align: center;
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 0.75em;
        }
        .oauth-info .ent-badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">🛡️</div>
                <h1>AI Privacy Gateway <span class="version-badge">Admin</span></h1>
                <p>管理后台登录</p>
            </div>
            
            <div class="error-message" id="error-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary" id="login-btn">登录</button>
            </form>

            <!-- OAuth / SSO Login (Enterprise) -->
            <div class="oauth-section" id="oauth-section" style="display:none;">
                <div class="oauth-divider">
                    <span class="oauth-divider-text">或使用 SSO 登录</span>
                </div>
                <div class="oauth-buttons">
                    <button class="btn btn-oauth btn-google" onclick="oauthLogin('google')">
                        <svg class="oauth-icon" viewBox="0 0 48 48" width="20" height="20">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.29.66 6.42 1.82 9.31l7.97-6.16.74-.56z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Sign in with Google
                    </button>
                    <button class="btn btn-oauth btn-github" onclick="oauthLogin('github')">
                        <svg class="oauth-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Sign in with GitHub
                    </button>
                </div>
            </div>

            <div class="footer">
                <p>AI Privacy Gateway &copy; 2024</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        
        // Check if already logged in
        const existingToken = localStorage.getItem('admin_token');
        if (existingToken) {
            // Verify token is still valid
            fetch(API_BASE + '/admin/stats', {
                headers: { 'Authorization': `Bearer ${existingToken}` }
            })
            .then(resp => {
                if (resp.ok) {
                    window.location.href = '/admin/static/admin.html';
                } else {
                    localStorage.removeItem('admin_token');
                }
            })
            .catch(() => {
                // Token invalid, stay on login page
            });
        }
        
        // Form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-message');
            
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>登录中...';
            errorMsg.classList.remove('show');
            
            try {
                const resp = await fetch(API_BASE + '/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.token) {
                    // Store token
                    localStorage.setItem('admin_token', data.token);
                    
                    // Redirect to admin panel
                    window.location.href = '/admin/static/admin.html';
                } else {
                    showError(data.message || data.detail || '登录失败，请检查用户名和密码');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('网络错误，请稍后重试');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
        
        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        // ==================== OAuth / SSO ====================

        // Check if redirected from OAuth callback with a token in URL
        const urlParams = new URLSearchParams(window.location.search);
        const oauthToken = urlParams.get('token');
        if (oauthToken) {
            localStorage.setItem('admin_token', oauthToken);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
            window.location.href = '/admin/static/admin.html';
        }

        function oauthLogin(provider) {
            window.location.href = API_BASE + '/auth/oauth/login/' + provider;
        }

        async function checkOAuthConfig() {
            try {
                // Check if OAuth is available by calling the health/license endpoint
                const resp = await fetch(API_BASE + '/admin/license/check');
                const data = await resp.json();
                // Only show OAuth options for Enterprise tier
                if (data.tier === 'enterprise') {
                    const section = document.getElementById('oauth-section');
                    if (section) section.style.display = 'block';
                }
            } catch (e) {
                // OAuth not available, hide section
            }
        }

        // Focus username field on load
        document.getElementById('username').focus();
        checkOAuthConfig();
    </script>
</body>
</html>
