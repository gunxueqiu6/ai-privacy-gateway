# Docker Sidecar 配置示例
# 方案 C：Docker Compose Sidecar 模式

version: '3.8'

services:
  # 企业原有的 AI 应用
  company-ai-app:
    image: your-company/ai-app:latest
    container_name: company-ai-app
    environment:
      # 改前：OPENAI_API_BASE=https://api.openai.com/v1
      # 改后：接入隐私网关
      - OPENAI_API_BASE=http://ai-privacy-gateway:9999/v1
      - OPENAI_API_KEY=sk-your-api-key
    depends_on:
      - ai-privacy-gateway
    networks:
      - ai-network

  # AI 隐私网关（Sidecar）
  ai-privacy-gateway:
    image: ai-privacy-gateway:lite
    container_name: ai-privacy-vault
    ports:
      - "9999:9999"   # 可选：暴露给外部访问
    volumes:
      - ./vault_data:/app/vault_data
    environment:
      - VERSION=lite
      - TARGET_LLM=https://api.openai.com
      - LISTEN_PORT=9999
    networks:
      - ai-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ai-network:
    driver: bridge