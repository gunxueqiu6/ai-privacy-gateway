# ============================================================
# AI Privacy Gateway Enterprise - Nginx Configuration
# ============================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 上游服务器配置
    upstream privacy-gateway {
        server privacy-gateway:9999;
        # 添加更多节点实现负载均衡
        # server privacy-gateway-2:9999;
        # server privacy-gateway-3:9999;

        # 负载均衡策略
        least_conn;
        # ip_hash;  # 如果需要会话保持

        # 健康检查
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    # HTTPS 服务器
    server {
        listen 443 ssl http2;
        server_name api.yourcompany.com;

        # SSL 证书
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头部
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # 代理配置
        location / {
            # 转发到上游
            proxy_pass http://privacy-gateway;

            # 代理头部
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（用于 SSE 流式响应）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 缓冲区设置（支持大响应）
            proxy_buffering off;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # 限制请求大小
            client_max_body_size 50m;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 '{"status": "healthy"}';
            add_header Content-Type application/json;
        }
    }

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name api.yourcompany.com;
        return 301 https://$host$request_uri;
    }

    # 管理后台
    server {
        listen 443 ssl http2;
        server_name admin.yourcompany.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # 限制访问管理后台（仅内网 IP）
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        location / {
            proxy_pass http://privacy-gateway/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}