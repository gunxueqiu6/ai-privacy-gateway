name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'website-astro/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website-astro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website-astro/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx wrangler pages deploy dist --project-name=privacygw --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f1846b332b815c45d4dd011a5a71923a
