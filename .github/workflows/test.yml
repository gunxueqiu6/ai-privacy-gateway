name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [main]

jobs:
  test-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  js-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json

      - run: npm ci

      - run: npm test

      - run: npm run lint

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          pip install flake8 black mypy

      - name: Check code style (Black)
        run: |
          black --check --diff .

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --extend-ignore=E203,W503

      - name: Run mypy
        run: |
          mypy . --ignore-missing-imports

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Lite Docker image
        run: |
          docker build -t ai-privacy-gateway:lite -f Dockerfile .

      - name: Test Docker container
        run: |
          docker run -d --name test-gateway -p 9999:9999 ai-privacy-gateway:lite
          for i in $(seq 1 12); do
            sleep 2
            if curl -sf http://localhost:9999/health; then
              echo "Gateway healthy after $((i * 2))s"
              break
            fi
            echo "Waiting for gateway... ($((i * 2))s)"
          done
          curl -f http://localhost:9999/health || (docker logs test-gateway && exit 1)
          docker stop test-gateway

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scanning tools
        run: |
          pip install pip-audit bandit

      - name: Run pip-audit (dependency vulnerability scan)
        run: |
          pip-audit

      - name: Run bandit (SAST)
        run: |
          bandit -r . --exclude ./tests,./website-astro,./sdk --level medium
