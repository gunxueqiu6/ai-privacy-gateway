name: Release AI Privacy Gateway

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-privacy-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=raw,value=lite

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        run: |
          docker run --rm aquasec/trivy image ghcr.io/${{ github.repository_owner }}/ai-privacy-gateway:lite --severity CRITICAL,HIGH --exit-code 0

      - name: Verify Docker image
        run: |
          docker run -d --name ci-test -p 19999:9999 ghcr.io/${{ github.repository_owner }}/ai-privacy-gateway:lite
          sleep 5
          curl -f --retry 3 --retry-delay 2 http://localhost:19999/health || (docker logs ci-test && exit 1)
          docker stop ci-test

      - name: Build and push Docker image with provenance
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha

      - name: Export Docker image
        run: |
          docker save ghcr.io/${{ github.repository_owner }}/ai-privacy-gateway:lite > lite_image.tar

      - name: Generate Docker image checksum
        run: sha256sum lite_image.tar > lite_image.tar.sha256

      - name: Upload Docker checksum
        uses: actions/upload-artifact@v4
        with:
          name: lite-docker-checksum
          path: lite_image.tar.sha256

      - name: Upload Lite Docker image
        uses: actions/upload-artifact@v4
        with:
          name: lite-docker-image
          path: lite_image.tar

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --name PrivacyGateway --add-data "static;static" main.py

      - name: Generate Windows executable checksum
        run: certutil -hashfile dist/PrivacyGateway.exe SHA256 > PrivacyGateway.exe.sha256

      - name: Upload Windows checksum
        uses: actions/upload-artifact@v4
        with:
          name: windows-checksum
          path: PrivacyGateway.exe.sha256

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/PrivacyGateway.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS executable
        run: pyinstaller --onefile --name PrivacyGateway --add-data "static:static" main.py

      - name: Generate macOS executable checksum
        run: shasum -a 256 dist/PrivacyGateway > PrivacyGateway.sha256

      - name: Upload macOS checksum
        uses: actions/upload-artifact@v4
        with:
          name: macos-checksum
          path: PrivacyGateway.sha256

      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: macos-exe
          path: dist/PrivacyGateway

  publish-js-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json

      - name: Build JS SDK
        run: |
          npm ci
          npm run build
        working-directory: sdk/js

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./sdk/js/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Publish to npm
        run: npm publish
        working-directory: sdk/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: [build-lite, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python <<EOF
import re, sys
changelog = open('CHANGELOG.md').read()
version = '${VERSION}'
pattern = r'## \[' + re.escape(version) + r'\].*?\n(.*?)(?=\n## \[|\n---|\Z)'
match = re.search(pattern, changelog, re.DOTALL)
if match:
    print(match.group(1).strip())
else:
    print(f'Release notes for version {version} not found in CHANGELOG.md', file=sys.stderr)
    exit(1)
EOF > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            lite-docker-image/lite_image.tar
            lite-docker-checksum/lite_image.tar.sha256
            windows-exe/PrivacyGateway.exe
            windows-checksum/PrivacyGateway.exe.sha256
            macos-exe/PrivacyGateway
            macos-checksum/PrivacyGateway.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
