<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard — AI Privacy Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2a2a40;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 24px;
            color: #22c55e;
            font-weight: 700;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .auth-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .auth-section input {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }

        .auth-section input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .btn {
            background: #22c55e;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .btn.secondary {
            background: #374151;
            color: #e0e0e0;
        }

        .btn.secondary:hover {
            background: #4b5563;
        }

        .error {
            background: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .hidden {
            display: none !important;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card.green .value { color: #22c55e; }
        .stat-card.yellow .value { color: #f59e0b; }
        .stat-card.red .value { color: #ef4444; }
        .stat-card.blue .value { color: #3b82f6; }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filters select, .filters input {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .filters select:focus, .filters input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .table-container {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #151525;
            color: #888;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: #151525;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.healthy {
            background: #064e3b;
            color: #22c55e;
        }

        .status-badge.warning {
            background: #78350f;
            color: #f59e0b;
        }

        .status-badge.offline {
            background: #450a0a;
            color: #ef4444;
        }

        .status-badge.unknown {
            background: #1f2937;
            color: #9ca3af;
        }

        .status-badge.error {
            background: #450a0a;
            color: #ef4444;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge.healthy .status-dot { background: #22c55e; }
        .status-badge.warning .status-dot { background: #f59e0b; }
        .status-badge.offline .status-dot { background: #ef4444; }
        .status-badge.error .status-dot { background: #ef4444; }
        .status-badge.unknown .status-dot { background: #9ca3af; }

        .tier-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .tier-badge.pro {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .tier-badge.enterprise {
            background: #422006;
            color: #f59e0b;
        }

        .refresh-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #888;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: #888;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #333;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty {
            text-align: center;
            padding: 48px;
            color: #666;
        }

        .detail-panel {
            background: #151525;
            border-top: 1px solid #333;
            padding: 24px;
        }

        .detail-panel h3 {
            margin-bottom: 16px;
            color: #e0e0e0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .detail-item {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 8px;
        }

        .detail-item .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 16px;
            font-weight: 600;
        }

        .action-btn {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: #22c55e;
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div>
                    <h1>Provider Dashboard</h1>
                    <p>AI Privacy Gateway — 运维管理平台</p>
                </div>
            </div>
            <div class="auth-section">
                <input type="password" id="apiKeyInput" placeholder="输入 Admin API Key">
                <button class="btn" id="loginBtn">登录</button>
                <button class="btn secondary" id="refreshBtn">刷新数据</button>
            </div>
        </header>

        <div id="errorBox" class="error hidden"></div>

        <div id="content" class="hidden">
            <div class="stats-grid">
                <div class="stat-card green">
                    <div class="label">活跃部署</div>
                    <div class="value" id="activeDeployments">-</div>
                </div>
                <div class="stat-card yellow">
                    <div class="label">警告实例</div>
                    <div class="value" id="warningDeployments">-</div>
                </div>
                <div class="stat-card red">
                    <div class="label">离线实例</div>
                    <div class="value" id="offlineDeployments">-</div>
                </div>
                <div class="stat-card blue">
                    <div class="label">今日总脱敏量</div>
                    <div class="value" id="totalMaskCount">-</div>
                </div>
            </div>

            <div class="refresh-info">
                <span id="lastRefresh">上次刷新: --</span>
                <span>自动刷新: 30秒</span>
            </div>

            <div class="version-stats" id="versionStats" style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;"></div>

            <div class="filters">
                <select id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="healthy">正常</option>
                    <option value="warning">警告</option>
                    <option value="offline">离线</option>
                    <option value="unknown">未知</option>
                </select>
                <select id="tierFilter">
                    <option value="">全部版本</option>
                    <option value="pro">Pro</option>
                    <option value="enterprise">Enterprise</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜索邮箱或主机名...">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>客户邮箱</th>
                            <th>License</th>
                            <th>版本</th>
                            <th>状态</th>
                            <th>脱敏量</th>
                            <th>错误数</th>
                            <th>主机名</th>
                            <th>最后心跳</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="deploymentsTable">
                        <tr><td colspan="9"><div class="loading"></div></td></tr>
                    </tbody>
                </table>
                <div class="detail-panel hidden" id="detailPanel"></div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('adminApiKey') || '';
        let refreshInterval = null;
        let currentStats = null;
        let currentDeployments = [];

        const apiKeyInput = document.getElementById('apiKeyInput');
        const loginBtn = document.getElementById('loginBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const errorBox = document.getElementById('errorBox');
        const content = document.getElementById('content');
        const deploymentsTable = document.getElementById('deploymentsTable');
        const statusFilter = document.getElementById('statusFilter');
        const tierFilter = document.getElementById('tierFilter');
        const searchInput = document.getElementById('searchInput');

        apiKeyInput.value = apiKey;

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
        }

        async function fetchDashboardStats() {
            const response = await fetch('/api/admin/dashboard', {
                headers: {
                    'Authorization': `Bearer ${apiKey}`
                }
            });
            if (!response.ok) throw new Error('获取统计数据失败');
            return response.json();
        }

        async function fetchDeployments() {
            let url = '/api/admin/deployments';
            const params = new URLSearchParams();
            if (statusFilter.value) params.append('status', statusFilter.value);
            if (tierFilter.value) params.append('tier', tierFilter.value);
            if (searchInput.value) params.append('search', searchInput.value);
            if (params.toString()) url += '?' + params.toString();

            const response = await fetch(url, {
                headers: {
                    'Authorization': `Bearer ${apiKey}`
                }
            });
            if (!response.ok) throw new Error('获取部署列表失败');
            return response.json();
        }

        function updateStats(stats) {
            currentStats = stats;
            document.getElementById('activeDeployments').textContent = stats.active_deployments || 0;
            document.getElementById('warningDeployments').textContent = stats.warning_deployments || 0;
            document.getElementById('offlineDeployments').textContent = stats.offline_deployments || 0;
            document.getElementById('totalMaskCount').textContent = stats.total_mask_count || 0;
            document.getElementById('lastRefresh').textContent = '上次刷新: ' + new Date().toLocaleString('zh-CN');

            // 版本分布
            const versionStats = document.getElementById('versionStats');
            const dist = stats.version_distribution || {};
            const labels = { lite: 'Lite', pro: 'Pro', enterprise: 'Enterprise' };
            const colors = { lite: '#9ca3af', pro: '#60a5fa', enterprise: '#f59e0b' };
            versionStats.innerHTML = Object.entries(labels).map(([k, v]) => {
                const count = dist[k] || 0;
                return `<span style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:8px 16px;font-size:13px;color:${colors[k]}"><strong>${v}:</strong> ${count} 在线</span>`;
            }).join('');
        }

        function renderDeployments(deployments) {
            currentDeployments = deployments;
            if (!deployments || deployments.length === 0) {
                deploymentsTable.innerHTML = '<tr><td colspan="9" class="empty">暂无部署实例</td></tr>';
                return;
            }

            deploymentsTable.innerHTML = deployments.map((dep, idx) => `
                <tr class="deployment-row" data-index="${idx}" style="cursor: pointer;">
                    <td>${dep.customer_email || '—'}</td>
                    <td><code style="font-family: monospace; font-size: 12px;">${dep.license_key?.substring(0, 16) || '—'}...</code></td>
                    <td><span class="tier-badge ${dep.tier || 'pro'}">${(dep.tier || 'pro').toUpperCase()}</span></td>
                    <td><span class="status-badge ${dep.status || 'unknown'}"><span class="status-dot"></span>${statusLabel(dep.status)}</span></td>
                    <td>${(dep.mask_count || 0).toLocaleString()}</td>
                    <td>${dep.error_count || 0}</td>
                    <td>${dep.hostname || '—'}</td>
                    <td>${dep.last_heartbeat ? new Date(dep.last_heartbeat).toLocaleString('zh-CN') : '—'}</td>
                    <td><button class="action-btn detail-btn" data-index="${idx}">详情</button></td>
                </tr>
            `).join('');

            // 绑定详情按钮
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    showDetail(currentDeployments[idx]);
                });
            });

            // 绑定行点击
            document.querySelectorAll('.deployment-row').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = parseInt(row.dataset.index);
                    showDetail(currentDeployments[idx]);
                });
            });
        }

        function statusLabel(status) {
            const labels = { healthy: '健康', warning: '警告', offline: '离线', error: '异常', unknown: '未知' };
            return labels[status] || status;
        }

        function showDetail(dep) {
            const panel = document.getElementById('detailPanel');
            const firstSeen = dep.first_seen ? new Date(dep.first_seen).toLocaleString('zh-CN') : '—';
            const lastHb = dep.last_heartbeat ? new Date(dep.last_heartbeat).toLocaleString('zh-CN') : '—';

            panel.innerHTML = `
                <h3>${dep.customer_email || '未知客户'} — ${dep.license_key?.substring(0, 16) || '—'}...</h3>
                <div class="detail-grid">
                    <div class="detail-item"><div class="label">版本</div><div class="value">${dep.version || '—'}</div></div>
                    <div class="detail-item"><div class="label">版本类型</div><div class="value">${(dep.version_type || dep.tier || '—').toUpperCase()}</div></div>
                    <div class="detail-item"><div class="label">状态</div><div class="value"><span class="status-badge ${dep.status || 'unknown'}"><span class="status-dot"></span>${statusLabel(dep.status)}</span></div></div>
                    <div class="detail-item"><div class="label">主机名</div><div class="value">${dep.hostname || '—'}</div></div>
                    <div class="detail-item"><div class="label">容器 ID</div><div class="value">${dep.container_id || '—'}</div></div>
                    <div class="detail-item"><div class="label">实例 ID</div><div class="value">${dep.instance_id || '—'}</div></div>
                    <div class="detail-item"><div class="label">首次上线</div><div class="value">${firstSeen}</div></div>
                    <div class="detail-item"><div class="label">最后心跳</div><div class="value">${lastHb}</div></div>
                    <div class="detail-item"><div class="label">运行时长</div><div class="value">${formatUptime(dep.uptime_seconds || 0)}</div></div>
                    <div class="detail-item"><div class="label">脱敏总量</div><div class="value" style="color:#22c55e;">${(dep.mask_count || 0).toLocaleString()}</div></div>
                    <div class="detail-item"><div class="label">实体总量</div><div class="value" style="color:#3b82f6;">${(dep.entity_count || 0).toLocaleString()}</div></div>
                    <div class="detail-item"><div class="label">错误数</div><div class="value" style="color:${dep.error_count > 0 ? '#ef4444' : '#e0e0e0'};">${dep.error_count || 0}</div></div>
                </div>
            `;
            panel.classList.remove('hidden');
        }

        function formatUptime(seconds) {
            if (seconds <= 0) return '—';
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const parts = [];
            if (d > 0) parts.push(`${d}天`);
            if (h > 0) parts.push(`${h}时`);
            if (m > 0) parts.push(`${m}分`);
            return parts.join(' ') || '<1分';
        }

        async function refreshData() {
            content.classList.remove('hidden');
            try {
                hideError();
                const [stats, data] = await Promise.all([fetchDashboardStats(), fetchDeployments()]);
                updateStats(stats);
                renderDeployments(data.deployments || []);
                document.getElementById('detailPanel').classList.add('hidden');
            } catch (e) {
                showError(e.message);
            }
        }

        function login() {
            apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                showError('请输入 Admin API Key');
                return;
            }
            localStorage.setItem('adminApiKey', apiKey);
            refreshData();
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshData, 30000);
        }

        loginBtn.addEventListener('click', login);
        refreshBtn.addEventListener('click', refreshData);

        statusFilter.addEventListener('change', refreshData);
        tierFilter.addEventListener('change', refreshData);
        searchInput.addEventListener('input', debounce(refreshData, 500));

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        if (apiKey) {
            refreshData();
            refreshInterval = setInterval(refreshData, 30000);
        }
    </script>
</body>
</html>
