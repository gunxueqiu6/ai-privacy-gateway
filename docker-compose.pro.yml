version: '3.8'

services:
  privacy-gateway-pro:
    build:
      context: .
      dockerfile: Dockerfile.pro
    container_name: ai-privacy-vault-pro
    ports:
      - "9999:9999"
    volumes:
      - ./vault_data:/app/vault_data
    environment:
      - VERSION=pro
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_SERVER_URL=https://your-license-server.com:8443
      - TARGET_LLM=https://api.openai.com
      - LISTEN_PORT=9999
      - DB_TYPE=sqlite
      - MASK_ENGINE_TYPE=regex
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # License Server（可选，部署在 VPS）
  license-server:
    build:
      context: ./license_server
      dockerfile: Dockerfile
    container_name: license-server
    ports:
      - "8443:8443"
    volumes:
      - ./license_data:/app/license_data
    restart: always