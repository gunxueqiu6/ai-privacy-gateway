apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-privacy-gateway.fullname" . }}
  labels:
    {{- include "ai-privacy-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-privacy-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ai-privacy-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ai-privacy-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.listenPort }}
              protocol: TCP
          env:
            - name: VERSION
              value: {{ .Values.config.version }}
            - name: LICENSE_KEY
              value: {{ .Values.config.licenseKey }}
            - name: LICENSE_SERVER_URL
              value: {{ .Values.config.licenseServerUrl }}
            - name: TARGET_LLM
              value: {{ .Values.config.targetLLM }}
            - name: LISTEN_PORT
              value: "{{ .Values.config.listenPort }}"
            - name: DB_TYPE
              value: {{ .Values.config.dbType }}
            - name: MASK_ENGINE_TYPE
              value: {{ .Values.config.maskEngineType }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host }}
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password }}
            {{- end }}
            {{- if .Values.alerts.dingtalkWebhook }}
            - name: DINGTALK_WEBHOOK
              value: {{ .Values.alerts.dingtalkWebhook }}
            {{- end }}
            {{- if .Values.alerts.feishuWebhook }}
            - name: FEISHU_WEBHOOK
              value: {{ .Values.alerts.feishuWebhook }}
            {{- end }}
            {{- if .Values.alerts.wecomWebhook }}
            - name: WECOM_WEBHOOK
              value: {{ .Values.alerts.wecomWebhook }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: {{ .Values.healthCheck.interval }}
            timeoutSeconds: {{ .Values.healthCheck.timeout }}
            failureThreshold: {{ .Values.healthCheck.retries }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}